<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMS Core | System Boot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap');

    :root {
      --bg-dark: #0A0C10; 
      --accent-blue: #007AFF;
      --text-main: #F5F5F7;
      --text-dim: #86868B;
      --glass-stroke: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-dark);
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* Background Ambient Glow */
    body::before {
      content: '';
      position: absolute;
      width: 140%; height: 140%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 122, 255, 0.08) 0%, transparent 60%);
      animation: pulseGlow 10s ease-in-out infinite;
      pointer-events: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
      animation: bootIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Logo Styling - Industrial Graphite Gradient */
    .logo-container {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 12px;
      background: linear-gradient(180deg, #FFFFFF 0%, #A1A1A6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    .app-info {
      margin-bottom: 60px;
    }

    .app-name {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 0;
    }

    .sub-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent-blue);
      margin-top: 10px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    /* Loader - Ultra Slim macOS Style */
    .loader-wrapper {
      width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loader-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #007AFF, #5AC8FA);
      box-shadow: 0 0 12px rgba(0, 122, 255, 0.4);
      /* Smooth Transition untuk Real-time data */
      transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .status-text {
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    /* Footer - Station Branding */
    .footer {
      position: absolute;
      bottom: 40px;
      width: 85%;
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: rgba(134, 134, 139, 0.3);
      border-top: 1px solid var(--glass-stroke);
      padding-top: 20px;
    }

    .footer-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .label-blue { color: var(--accent-blue); opacity: 0.6; }

    @keyframes bootIn {
      0% { opacity: 0; transform: scale(0.97) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">DSENGINE</div>
    
    <div class="app-info">
      <h1 class="app-name">Work Intelligence System</h1>
      <div class="sub-name">DMS_CORE_STABLE // BUILD_V2.4.0</div>
    </div>
    
    <div class="loader-wrapper">
      <div class="loader-track">
        <div class="loader-bar" id="progressBar"></div>
      </div>
      <div class="status-text" id="statusLabel">Initializing Kernel...</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-section">
      <span class="label-blue">TERMINAL_NODE</span>
      <span>STATION-01 // JKT</span>
    </div>
    <div class="footer-section" style="text-align: center;">
      <span class="label-blue">LEAD_ENGINEER</span>
      <span>SIGIT S. // SYSTEMS</span>
    </div>
    <div class="footer-section" style="text-align: right;">
      <span class="label-blue">ENVIRONMENT</span>
      <span>PRODUCTION_MODE</span>
    </div>
  </div>

<script>
    const bar = document.getElementById('progressBar');
    const label = document.getElementById('statusLabel');

    // Fungsi Utama Update Progress
    const updateProgress = (percent, message) => {
        const safePercent = Math.min(Math.max(percent, 0), 100);
        bar.style.width = `${safePercent}%`;
        
        if (message) {
            // Mengubah format "loading_assets" menjadi "LOADING ASSETS"
            label.textContent = message.replace(/_/g, ' ').toUpperCase() + "...";
        }
    };

    // Jalur 1: Interaksi Real-time dengan Electron
    if (window.electron && window.electron.onSplashProgress) {
        window.electron.onSplashProgress((data) => {
            if (data) {
                updateProgress(data.percent || 0, data.message);
            }
        });
    } 
    // Jalur 2: Simulasi Preview (Jika dibuka di Browser biasa)
    else {
        let currentProgress = 0;
        const simulationSteps = [
            { p: 15, m: "Booting_Kernel" },
            { p: 40, m: "Fetching_Neural_Data" },
            { p: 70, m: "Syncing_Industrial_Logs" },
            { p: 90, m: "Finalizing_Interface" },
            { p: 100, m: "System_Ready" }
        ];

        let stepIdx = 0;
        const interval = setInterval(() => {
            currentProgress += Math.random() * 1.5;
            
            if (stepIdx < simulationSteps.length && currentProgress >= simulationSteps[stepIdx].p) {
                updateProgress(simulationSteps[stepIdx].p, simulationSteps[stepIdx].m);
                stepIdx++;
            }

            if (currentProgress >= 100) {
                updateProgress(100, "Access_Granted");
                clearInterval(interval);
            } else {
                bar.style.width = `${currentProgress}%`;
            }
        }, 40);
    }
</script>
</body>
</html>
