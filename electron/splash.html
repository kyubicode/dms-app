<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Booting</title>
  <style>
    /* Menggunakan font yang sama dengan dmsTheme */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500&display=swap');

    body { 
      margin: 0; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      /* Dominasi Background Putih/Slate 50 sesuai tema kamu */
      background: #F8FAFC; 
      font-family: 'Inter', sans-serif;
      color: #001B3D; /* palette.navy[900] */
      overflow: hidden;
    }

    /* Pattern titik halus agar tidak terlalu kosong */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(#E2E8F0 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.5;
    }

    .logo-container { 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      position: relative;
      z-index: 10;
      margin-bottom: 50px;
    }

    /* Logo Box: Menggunakan Aksen Amber/Kuning sesuai tema */
    .logo-box { 
      background: #F59E0B; /* palette.amber[500] */
      color: #00162E; /* palette.navy[950] (text.onAccent) */
      padding: 12px 28px; 
      font-size: 36px; 
      font-weight: 900; 
      border-radius: 12px;
      letter-spacing: -1px;
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.25);
      animation: float 3s ease-in-out infinite;
    }

    .brand-name {
      margin-top: 15px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #003366; /* palette.navy[700] (Primary) */
      text-transform: uppercase;
    }

    .status-wrapper {
      width: 300px;
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .message { 
      margin-bottom: 12px; 
      font-size: 10px; 
      color: #64748B; /* palette.slate[500] (Secondary Text) */
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .progress-container { 
      width: 100%; 
      height: 6px; 
      background: #E2E8F0; /* palette.slate[200] */
      border-radius: 100px; 
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
    }

    .progress-bar { 
      height: 100%; 
      width: 0%; 
      background: #003366; /* palette.navy[700] (Primary) */
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .footer-info { 
      position: absolute; 
      bottom: 40px; 
      font-size: 10px; 
      font-weight: 600;
      color: #94A3B8; /* palette.slate[400] */
      letter-spacing: 1px;
      z-index: 10;
    }

    .dev-name { 
      color: #F59E0B; /* palette.amber[500] */
      font-weight: 800;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Dekorasi Lingkaran Halus */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(0, 51, 102, 0.03);
      border-radius: 50%;
      filter: blur(50px);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="blob" style="top: -100px; right: -100px;"></div>
  <div class="blob" style="bottom: -100px; left: -100px;"></div>

  <div class="logo-container">
    <div class="logo-box">DS DEVELOPMENT</div>
    <div class="brand-name">DMS Management Report</div>
  </div>
  
  <div class="status-wrapper">
    <div class="message" id="statusMessage">CONNECTING_TO_CORE...</div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
  
  <div class="footer-info">
    STATION_ID: <span style="color:#64748B">LOCAL_HOST</span> // 
    DEV: <span class="dev-name">SIGIT S</span>
  </div>

<script>
    const progressBar = document.getElementById('progressBar');
    const statusMessage = document.getElementById('statusMessage');

    // UBAH DARI window.api MENJADI window.electron
    if (window.electron && window.electron.onSplashProgress) {
        window.electron.onSplashProgress((data) => {
            if (data) {
                const percent = data.percent || 0;
                const msg = data.message || "Initializing";

                progressBar.style.width = percent + '%';
                // Gaya teks: CAPITAL_WITH_UNDERSCORE
                statusMessage.textContent = msg.toUpperCase().replace(/\s/g, '_') + '...';
            }
        });
    } else {
        console.error("Electron API not found in Splash Screen");
        statusMessage.textContent = "IPC_HANDSHAKE_ERROR";
    }
</script>
</body>
</html>
